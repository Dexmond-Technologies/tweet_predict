services:
  - type: web
    name: tweetpredict-api
    env: node
    rootDir: "app/api"
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: PORT
        value: 3001
      - key: SOLANA_NETWORK
        value: mainnet-beta
      - key: RENDER_SERVICE_ID
        value: srv-d6idrfvkijhs7382csmg
