<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TweetPredict — Decentralized Prediction Markets on Solana</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Solana Web3.js  -->
    <script src="https://unpkg.com/@solana/web3.js@1.98.0/lib/index.iife.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg-primary: #06060f;
        --bg-secondary: #0c0c1d;
        --bg-card: rgba(255,255,255,0.04);
        --text-primary: #f0f0ff;
        --text-secondary: #8888aa;
        --blue: #3b82f6;
        --blue-glow: rgba(59,130,246,0.35);
        --pink: #ec4899;
        --pink-glow: rgba(236,72,153,0.35);
        --green: #10b981;
        --border: rgba(255,255,255,0.08);
        --radius: 16px;
      }
      body {
        font-family: 'Inter', -apple-system, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        overflow-x: hidden;
      }
      body::before, body::after {
        content: ''; position: fixed; border-radius: 50%; filter: blur(120px);
        opacity: 0.15; z-index: 0; pointer-events: none;
      }
      body::before {
        width: 600px; height: 600px; background: var(--blue);
        top: -200px; left: -100px; animation: floatOrb 12s ease-in-out infinite alternate;
      }
      body::after {
        width: 500px; height: 500px; background: var(--pink);
        bottom: -200px; right: -100px; animation: floatOrb 15s ease-in-out infinite alternate-reverse;
      }
      @keyframes floatOrb {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(80px, 60px) scale(1.15); }
      }
      /* Rest of the styles remain standard... */
      .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }
      header { padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 48px; }
      .header-inner { display: flex; justify-content: space-between; align-items: center; }
      .logo { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; background: linear-gradient(135deg, var(--blue), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
      .logo span { font-weight: 500; opacity: 0.7; -webkit-text-fill-color: var(--text-secondary); margin-left: 6px; font-size: 13px; }
      .nav-links { display: flex; gap: 32px; align-items: center; }
      .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.2s; }
      .nav-links a:hover, .nav-links a.active { color: var(--text-primary); }
      .btn-connect { background: linear-gradient(135deg, var(--blue), #6366f1); color: #fff; border: none; padding: 10px 24px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: transform 0.15s, box-shadow 0.3s; box-shadow: 0 0 20px var(--blue-glow); }
      .btn-connect:hover { transform: translateY(-1px); box-shadow: 0 0 30px var(--blue-glow); }
      /* Hero */
      .hero { text-align: center; margin-bottom: 64px; }
      .hero h2 { font-size: 48px; font-weight: 900; letter-spacing: -1.5px; line-height: 1.15; margin-bottom: 16px; }
      .hero h2 .gradient { background: linear-gradient(135deg, var(--blue), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
      .hero p { color: var(--text-secondary); font-size: 18px; max-width: 560px; margin: 0 auto 32px; line-height: 1.6; }
      .hero-stats { display: flex; justify-content: center; gap: 48px; }
      .stat { text-align: center; }
      .stat-value { font-size: 28px; font-weight: 800; }
      .stat-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 4px; }
      .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
      .action-bar h3 { font-size: 22px; font-weight: 700; }
      .btn-create { display: flex; align-items: center; gap: 8px; background: linear-gradient(135deg, var(--pink), #a855f7); color: #fff; border: none; padding: 12px 28px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: transform 0.15s, box-shadow 0.3s; box-shadow: 0 0 20px var(--pink-glow); }
      .btn-create:hover { transform: translateY(-1px); box-shadow: 0 0 30px var(--pink-glow); }
      .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; margin-bottom: 64px; }
      .market-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; display: flex; flex-direction: column; transition: border-color 0.3s, transform 0.2s, box-shadow 0.3s; position: relative; overflow: hidden; }
      .market-card:hover { border-color: rgba(255,255,255,0.15); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
      .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
      .badge-active { background: rgba(16,185,129,0.15); color: var(--green); padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
      .badge-closing { background: rgba(234,179,8,0.15); color: #eab308; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
      .card-timer { font-size: 12px; color: var(--text-secondary); }
      .card-question { font-size: 17px; font-weight: 700; line-height: 1.4; margin-bottom: 24px; min-height: 48px; }
      .progress-track { width: 100%; height: 10px; background: rgba(255,255,255,0.06); border-radius: 10px; overflow: hidden; margin-bottom: 10px; position: relative; }
      .progress-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, var(--blue), #818cf8); transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1); }
      .progress-labels { display: flex; justify-content: space-between; font-size: 13px; font-weight: 700; margin-bottom: 24px; }
      .yes-label { color: var(--blue); }
      .no-label { color: var(--pink); }
      .card-volume { font-size: 12px; color: var(--text-secondary); margin-bottom: 20px; }
      .bet-actions { display: flex; gap: 10px; margin-top: auto; }
      .btn-yes, .btn-no { flex: 1; padding: 12px 0; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; border: 1px solid; transition: all 0.2s; }
      .btn-yes { background: rgba(59,130,246,0.1); color: var(--blue); border-color: rgba(59,130,246,0.3); }
      .btn-yes:hover { background: var(--blue); color: #fff; box-shadow: 0 0 20px var(--blue-glow); }
      .btn-no { background: rgba(236,72,153,0.1); color: var(--pink); border-color: rgba(236,72,153,0.3); }
      .btn-no:hover { background: var(--pink); color: #fff; box-shadow: 0 0 20px var(--pink-glow); }
      .btn-share { width: 44px; height: 44px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
      .btn-share:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
      
      .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 100; display: none; align-items: center; justify-content: center; }
      .modal-overlay.active { display: flex; }
      .modal { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 20px; padding: 40px; width: 90%; max-width: 520px; }
      .modal h3 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
      .modal p { color: var(--text-secondary); font-size: 14px; margin-bottom: 28px; }
      .form-group { margin-bottom: 20px; }
      .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-secondary); }
      .form-group input, .form-group textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--text-primary); }
      .modal-actions { display: flex; gap: 12px; margin-top: 28px; }
      .btn-modal-cancel { flex: 1; padding: 14px; border-radius: 12px; font-weight: 600; cursor: pointer; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-secondary); }
      .btn-modal-submit { flex: 1; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; background: linear-gradient(135deg, var(--blue), var(--pink)); border: none; color: #fff; }
      
      .bet-sides { display: flex; gap: 12px; margin-bottom: 20px; }
      .bet-side-btn { flex: 1; padding: 16px; border-radius: 12px; font-weight: 700; font-size: 16px; cursor: pointer; border: 2px solid; text-align: center; }
      .bet-side-btn.yes { background: rgba(59,130,246,0.08); border-color: rgba(59,130,246,0.3); color: var(--blue); }
      .bet-side-btn.yes.selected { background: var(--blue); color: #fff; }
      .bet-side-btn.no { background: rgba(236,72,153,0.08); border-color: rgba(236,72,153,0.3); color: var(--pink); }
      .bet-side-btn.no.selected { background: var(--pink); color: #fff; }
      footer { border-top: 1px solid var(--border); padding: 32px 0; text-align: center; color: var(--text-secondary); font-size: 13px; margin-top: 48px; }
      footer a { color: var(--blue); text-decoration: none; }
      .toast { position: fixed; bottom: 32px; right: 32px; z-index: 200; background: var(--bg-secondary); border: 1px solid var(--green); border-radius: 14px; padding: 16px 24px; display: flex; align-items: center; gap: 12px; transform: translateY(120px); opacity: 0; transition: all 0.4s; }
      .toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Use the global solanaWeb3 from the CDN
        const { Connection, PublicKey, Transaction, clusterApiUrl } = solanaWeb3;
        
        // Define API URL. Change to your real API URL once deployed
        const API_URL = 'http://localhost:3001';
        const NETWORK = 'devnet';

        const { useState, useEffect, useCallback } = React;

        function App() {
            const [markets, setMarkets] = useState([]);
            const [loading, setLoading] = useState(true);
            const [wallet, setWallet] = useState(null);
            const [toastMsg, setToastMsg] = useState('');
            
            // Modal states
            const [showCreate, setShowCreate] = useState(false);
            const [showBet, setShowBet] = useState(false);
            const [currentMarket, setCurrentMarket] = useState(null);
            const [betSide, setBetSide] = useState(null);
            
            // Form states
            const [question, setQuestion] = useState('');
            const [criteria, setCriteria] = useState('');
            const [endDays, setEndDays] = useState('30');
            const [betAmount, setBetAmount] = useState('');

            const showToast = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(''), 3000);
            };

            const fetchMarkets = useCallback(async () => {
                try {
                    const res = await fetch(`${API_URL}/api/markets`);
                    const data = await res.json();
                    setMarkets(data);
                } catch (e) {
                    console.error("Error fetching markets", e);
                } finally {
                    setLoading(false);
                }
            }, []);

            useEffect(() => {
                fetchMarkets();
            }, [fetchMarkets]);

            const connectWallet = async () => {
                if (window.solana && window.solana.isPhantom) {
                    try {
                        const response = await window.solana.connect();
                        setWallet(response.publicKey.toString());
                        showToast(`Connected: ${response.publicKey.toString().slice(0, 4)}...${response.publicKey.toString().slice(-4)}`);
                    } catch (err) {
                        showToast("Connection rejected");
                    }
                } else {
                    showToast("Please install Phantom wallet extension!");
                }
            };

            const createMarket = async () => {
                if (!wallet) return showToast('Connect wallet first');
                if (!question) return showToast('Enter a question');
                
                showToast('Preparing transaction...');
                try {
                    // Make request to your API server running on port 3001
                    const params = new URLSearchParams({ 
                        question, 
                        description: `[Manual] ${criteria}`, 
                        endDays 
                    }).toString();
                    
                    const res = await fetch(`${API_URL}/api/action/create?${params}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ account: wallet })
                    });
                    
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error);

                    showToast('Approve transaction in Phantom...');
                    
                    // Recover the transaction base64
                    const txBuf = Uint8Array.from(atob(data.transaction), c => c.charCodeAt(0));
                    const transaction = Transaction.from(txBuf);

                    // Ask phantom to sign and send the transaction
                    const connection = new Connection(clusterApiUrl(NETWORK), 'confirmed');
                    const { signature } = await window.solana.signAndSendTransaction(transaction);
                    await connection.confirmTransaction(signature, 'confirmed');

                    showToast('Market created successfully!');
                    setShowCreate(false);
                    fetchMarkets();
                } catch (err) {
                    showToast(`Failed: ${err.message}`);
                    console.error(err);
                }
            };
            
            const handleBet = async () => {
                if (!wallet) return showToast('Connect wallet first');
                if (!betAmount || parseFloat(betAmount) <= 0) return showToast('Enter valid amount');
                if (!betSide) return showToast('Select YES or NO');
                
                showToast('Preparing transaction...');
                try {
                    const res = await fetch(`${API_URL}/api/action/bet?market=${currentMarket.pubkey}&side=${betSide}&amount=${betAmount}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ account: wallet })
                    });
                    
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error);
                    
                    showToast('Approve transaction in Phantom...');
                    const txBuf = Uint8Array.from(atob(data.transaction), c => c.charCodeAt(0));
                    const transaction = Transaction.from(txBuf);

                    const connection = new Connection(clusterApiUrl(NETWORK), 'confirmed');
                    const { signature } = await window.solana.signAndSendTransaction(transaction);
                    await connection.confirmTransaction(signature, 'confirmed');

                    showToast('Bet placed successfully!');
                    setShowBet(false);
                    fetchMarkets();
                } catch (err) {
                    showToast(`Failed: ${err.message}`);
                }
            };

            const openBet = (market, side) => {
                setCurrentMarket(market);
                setBetSide(side);
                setShowBet(true);
            };

            // Format percentages
            const getPct = (yes, no) => {
                const y = parseFloat(yes) || 0;
                const n = parseFloat(no) || 0;
                const total = y + n;
                if (total === 0) return { yes: 50, no: 50 };
                return { 
                    yes: Math.round((y / total) * 100), 
                    no: Math.round((n / total) * 100) 
                };
            };

            // Calculate Volume accurately considering decimals (1M = 1 D3X for 6 decimals)
            const getVolDisplay = (yes, no) => {
                 const total = (parseFloat(yes) + parseFloat(no)) / 1000000;
                 return total.toFixed(2);
            };

            return (
                <div className="container">
                    <header>
                        <div className="header-inner">
                            <div className="logo">TweetPredict <span>on Solana</span></div>
                            <nav className="nav-links">
                                <a href="#" className="active">Markets</a>
                                <a href="#">My Bets</a>
                                <a href="https://github.com/Dexmond-Technologies/tweetprediction" target="_blank">GitHub</a>
                            </nav>
                            <button className="btn-connect" onClick={connectWallet}>
                                {wallet ? `🟢 ${wallet.slice(0,4)}...${wallet.slice(-4)}` : '🔗 Connect Wallet'}
                            </button>
                        </div>
                    </header>

                    <section className="hero">
                        <h2>Predict. Bet. <span className="gradient">Go Viral.</span></h2>
                        <p>The prediction market built for social virality. Create markets, share as Blinks on X, and let the crowd bet directly using <strong>D3x Coin</strong>.</p>
                        <div className="hero-stats">
                            <div className="stat"><div className="stat-value" style={{color:'var(--blue)'}}>ON CHAIN</div><div className="stat-label">Transactions</div></div>
                            <div className="stat"><div className="stat-value" style={{color:'var(--green)'}}>{markets.length || 0}</div><div className="stat-label">Active Markets</div></div>
                            <div className="stat"><div className="stat-value" style={{color:'var(--pink)'}}>D3X / SOL</div><div className="stat-label">Currencies</div></div>
                        </div>
                    </section>

                    <div className="action-bar">
                        <h3>🔥 Trending Markets</h3>
                        <button className="btn-create" onClick={() => setShowCreate(true)}>＋ Create Market</button>
                    </div>

                    {loading ? (
                        <div style={{ textAlign: 'center', padding: '40px' }}>Loading markets from Solana blockchain...</div>
                    ) : (
                        <div className="market-grid">
                            {markets.map(m => {
                                const p = getPct(m.totalYes, m.totalNo);
                                const isResolved = m.status.hasOwnProperty('resolved');
                                return (
                                    <div key={m.pubkey} className="market-card">
                                        <div className="card-header">
                                            <span className={isResolved ? "badge badge-closing" : "badge badge-active"}>
                                                {isResolved ? 'Resolved' : '● Live'}
                                            </span>
                                            <span className="card-timer">Closes: {new Date(m.endTimestamp * 1000).toLocaleDateString()}</span>
                                        </div>
                                        <div className="card-question">{m.question}</div>
                                        <div className="progress-track">
                                            <div className="progress-fill" style={{width: `${p.yes}%`}}></div>
                                        </div>
                                        <div className="progress-labels">
                                            <span className="yes-label">YES {p.yes}%</span>
                                            <span className="no-label">NO {p.no}%</span>
                                        </div>
                                        <div className="card-volume">Pool Volume: <strong>{getVolDisplay(m.totalYes, m.totalNo)} D3X</strong></div>
                                        <div className="bet-actions">
                                            <button className="btn-yes" onClick={() => openBet(m, 'yes')}>YES ↑</button>
                                            <button className="btn-no" onClick={() => openBet(m, 'no')}>NO ↓</button>
                                            <button className="btn-share" title="Share as Blink on X" onClick={() => {
                                                const url = `https://twitter.com/intent/tweet?text=Bet on "${m.question}" at TweetPredict! 🔮`;
                                                window.open(url, '_blank');
                                            }}>𝕏</button>
                                        </div>
                                    </div>
                                )
                            })}
                        </div>
                    )}

                    <footer>
                        Built on <a href="https://solana.com" target="_blank">Solana</a> · Powered by <strong>D3x Coin</strong> ($D3X) · By Dexmond Technologies
                    </footer>

                    {/* Modals using simple CSS overlay */}
                    {showCreate && (
                        <div className="modal-overlay active">
                            <div className="modal">
                                <h3>Create a New Market</h3>
                                <p>Ask any yes/no question. Share it on X!</p>
                                <div className="form-group">
                                    <label>Question</label>
                                    <input value={question} onChange={e => setQuestion(e.target.value)} placeholder="Will Bitcoin hit $200k?" />
                                </div>
                                <div className="form-group">
                                    <label>Resolution Criteria</label>
                                    <textarea value={criteria} onChange={e => setCriteria(e.target.value)} placeholder="How will this be verified?"></textarea>
                                </div>
                                <div className="modal-actions">
                                    <button className="btn-modal-cancel" onClick={() => setShowCreate(false)}>Cancel</button>
                                    <button className="btn-modal-submit" onClick={createMarket}>🚀 Launch Market</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showBet && currentMarket && (
                        <div className="modal-overlay active">
                            <div className="modal bet-modal">
                                <h3>Place Your Bet</h3>
                                <p>{currentMarket.question}</p>
                                <div className="bet-sides">
                                    <button className={`bet-side-btn yes ${betSide === 'yes' ? 'selected' : ''}`} onClick={() => setBetSide('yes')}>👍 YES</button>
                                    <button className={`bet-side-btn no ${betSide === 'no' ? 'selected' : ''}`} onClick={() => setBetSide('no')}>👎 NO</button>
                                </div>
                                <div className="form-group">
                                    <label>Amount (D3X Tokens)</label>
                                    <input type="number" min="0.1" step="0.1" value={betAmount} onChange={e => setBetAmount(e.target.value)} placeholder="0.00" />
                                </div>
                                <div className="modal-actions">
                                    <button className="btn-modal-cancel" onClick={() => setShowBet(false)}>Cancel</button>
                                    <button className="btn-modal-submit" onClick={handleBet}>⚡ Place Bet</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className={`toast ${toastMsg ? 'show' : ''}`}>
                        <span className="toast-icon">✨</span>
                        <span className="toast-text">{toastMsg}</span>
                    </div>
                </div>
            )
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
