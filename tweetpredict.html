<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TweetPredict - DEXMOND TECHNOLOGIES</title>
    <!-- Strict CSP -->
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; img-src 'self' data:;">
    <meta name="description" content="TweetPredict - Predict, Win, Repeat on Solana Devnet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/jpeg" href="images/favicon.jpg">
    <style>
        :root {
            --bg-dark: #0f111a;
            --bg-nav: #161824;
            --text-light: #ffffff;
            --text-muted: #94a3b8;
            --accent-blue: #7dd3fc;
            --accent-pink: #f472b6;
            --border-color: #2e3348;
            --btn-bg: #2a2e45;
            --btn-hover: #3b405f;
            --pill-bg: #1e293b;
            --solana-green: #10b981;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #131522 0%, #080910 100%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Navigation */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            max-width: 1200px;
            margin-top: 1.5rem;
            padding: 1rem 2rem;
            background-color: var(--bg-nav);
            border: 1px solid var(--border-color);
            border-radius: 100px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 800;
        }

        .nav-logo span.highlight {
            color: var(--accent-pink);
        }

        .badge-devnet {
            background-color: var(--pill-bg);
            color: var(--accent-blue);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            border: 1px solid var(--border-color);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 2rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .nav-links a:hover {
            color: var(--text-light);
            transition: color 0.2s;
        }

        .btn-wallet {
            background-color: var(--btn-bg);
            color: var(--text-light);
            border: 1px solid var(--border-color);
            padding: 0.75rem 1.5rem;
            border-radius: 999px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
        }

        .btn-wallet:hover {
            background-color: var(--btn-hover);
            border-color: #4b5278;
        }

        /* Hero Section */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 5rem 1rem 4rem;
            max-width: 800px;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--solana-green);
            font-size: 0.85rem;
            font-weight: 700;
            padding: 0.5rem 1.25rem;
            border-radius: 999px;
            border: 1px solid rgba(16, 185, 129, 0.3);
            margin-bottom: 2.5rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--solana-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--solana-green);
        }

        .hero h1 {
            font-size: 5rem;
            font-weight: 900;
            line-height: 1.1;
            margin: 0 0 1.5rem 0;
            background: linear-gradient(to right, #7dd3fc 0%, #c084fc 50%, #f472b6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin: 0;
            line-height: 1.5;
            max-width: 600px;
        }

        .hero p strong {
            color: var(--accent-blue);
            font-weight: 700;
        }

        /* Metrics */
        .metrics {
            display: flex;
            gap: 1.5rem;
            margin-top: 3.5rem;
        }

        .metric-card {
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.5rem 2rem;
            border-radius: 16px;
            min-width: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.35rem;
            box-sizing: border-box;
            transition: transform 0.2s, border-color 0.2s;
        }

        .metric-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .metric-value {
            font-size: 1.75rem;
            font-weight: 800;
            color: #ffffff;
        }

        .metric-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #64748b;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* Market Creation Preview */
        .card-preview {
            margin-top: 4rem;
            background-color: var(--bg-nav);
            border: 1px solid var(--border-color);
            border-radius: 20px 20px 0 0;
            width: 90%;
            max-width: 800px;
            padding: 2.5rem;
            display: flex;
            justify-content: space-between;
            border-bottom: none;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 0;
            flex: 1;
            box-sizing: border-box;
        }

        .preview-left {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .preview-title {
            font-size: 1.25rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #ffffff;
        }

        .preview-right {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .preview-hint {
            font-size: 0.9rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                padding: 1.5rem;
                border-radius: 20px;
                gap: 1.5rem;
            }
            .hero h1 {
                font-size: 3.5rem;
            }
            .metrics {
                flex-direction: column;
                width: 100%;
            }
            .card-preview {
                flex-direction: column;
                gap: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-logo">
            <a href="web3.html">Tweet<span class="highlight">Predict</span></a>
            <span class="badge-devnet">DEVNET</span>
        </div>
        <div class="nav-links">
            <a href="#">My Markets</a>
            <a href="#">Admin</a>
            <button class="btn-wallet">Select Wallet</button>
        </div>
    </nav>

    <!-- Hero -->
    <main class="hero">
        <div class="status-pill">
            <div class="status-dot"></div>
            LIVE ON SOLANA DEVNET
        </div>

        <h1>Predict. Win.<br>Repeat.</h1>
        <p>Launch a market &rarr; tweet it &rarr; earn <strong>1% of every bet</strong> from your followers in D3X.</p>

        <!-- Metrics -->
        <div class="metrics">
            <div class="metric-card">
                <span class="metric-value">0</span>
                <span class="metric-label">MARKETS</span>
            </div>
            <div class="metric-card">
                <span class="metric-value">2%</span>
                <span class="metric-label">PROTOCOL FEE</span>
            </div>
            <div class="metric-card">
                <span class="metric-value">D3X</span>
                <span class="metric-label">CURRENCY</span>
            </div>
        </div>
    </main>

    <!-- Bottom Preview Section -->
    <div class="card-preview">
        <div class="preview-left">
            <div class="preview-title">🌟 Create Your Market</div>
        </div>
        <div class="preview-right">
            <div class="preview-hint">👀 See how it'll look on Twitter</div>
        </div>
    </div>

</body>
</html>
